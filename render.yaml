services:
  - type: web
    name: duelbet-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromSecret: mongodb_uri
      - key: REDIS_URL
        fromSecret: redis_url
      - key: JWT_SECRET
        fromSecret: jwt_secret
      - key: JWT_REFRESH_SECRET
        fromSecret: jwt_refresh_secret
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromSecret: frontend_url
      - key: PAYNOW_ID
        fromSecret: paynow_id
      - key: PAYNOW_KEY
        fromSecret: paynow_key
      - key: PAYNOW_RESULT_URL
        fromSecret: paynow_result_url
      - key: PAYNOW_RETURN_URL
        fromSecret: paynow_return_url
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 1000
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000