services:
  - type: web
    name: duelbet-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromSecret: mongodb_uri
      - key: REDIS_URL
        fromSecret: redis_url
      - key: JWT_SECRET
        fromSecret: jwt_secret
      - key: JWT_REFRESH_SECRET
        fromSecret: jwt_refresh_secret
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromSecret: frontend_url
      - key: PAYNOW_INTEGRATION_ID
        fromSecret: paynow_integration_id
      - key: PAYNOW_INTEGRATION_KEY
        fromSecret: paynow_integration_key
      - key: PAYNOW_RESULT_URL
        fromSecret: paynow_result_url
      - key: PAYNOW_RETURN_URL
        fromSecret: paynow_return_url
      - key: FIREBASE_PROJECT_ID
        fromSecret: firebase_project_id
      - key: FIREBASE_CLIENT_EMAIL
        fromSecret: firebase_client_email
      - key: FIREBASE_PRIVATE_KEY
        fromSecret: firebase_private_key
      - key: SMTP_HOST
        fromSecret: smtp_host
      - key: SMTP_PORT
        fromSecret: smtp_port
      - key: SMTP_USER
        fromSecret: smtp_user
      - key: SMTP_PASS
        fromSecret: smtp_pass
      - key: EMAIL_FROM
        fromSecret: email_from
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 1000
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000